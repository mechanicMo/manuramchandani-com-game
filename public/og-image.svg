<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">

  <!-- Background -->
  <rect width="1200" height="630" fill="#FAF8F4"/>
  <!-- Left panel warm tint -->
  <rect width="560" height="630" fill="#F5F0E8"/>

  <!-- ===== LEFT SIDE: ILLUSTRATION ===== -->

  <!-- Desk -->
  <rect x="40" y="420" width="480" height="16" rx="4" fill="#1A1A1A"/>
  <rect x="70" y="436" width="14" height="60" fill="#1A1A1A"/>
  <rect x="476" y="436" width="14" height="60" fill="#1A1A1A"/>

  <!-- Sleeping person -->
  <!-- Torso -->
  <rect x="72" y="422" width="44" height="80" rx="12" fill="#3D5A8A"/>
  <!-- Arm on desk -->
  <rect x="45" y="405" width="130" height="18" rx="9" fill="#3D5A8A"/>
  <rect x="45" y="405" width="60" height="18" rx="9" fill="#D4956A"/>
  <!-- Head -->
  <ellipse cx="130" cy="408" rx="33" ry="25" fill="#D4956A"/>
  <!-- Hair -->
  <path d="M99 400 Q130 378 161 400 Q159 382 130 376 Q101 382 99 400Z" fill="#2A1A0A"/>
  <!-- Eye -->
  <path d="M117 404 Q130 410 143 404" stroke="#8A5A3A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Ear -->
  <ellipse cx="163" cy="410" rx="6" ry="9" fill="#C4855A"/>

  <!-- ZZZ -->
  <text x="136" y="378" font-family="Georgia, serif" font-size="28" font-weight="700" fill="#C8860A" opacity="0.85">z</text>
  <text x="160" y="356" font-family="Georgia, serif" font-size="21" font-weight="700" fill="#C8860A" opacity="0.6">z</text>
  <text x="179" y="338" font-family="Georgia, serif" font-size="15" font-weight="700" fill="#C8860A" opacity="0.38">z</text>

  <!-- Laptop -->
  <rect x="196" y="272" width="186" height="148" rx="10" fill="#1A1A1A"/>
  <rect x="207" y="282" width="164" height="124" rx="6" fill="#0D1E2C"/>
  <rect x="266" y="420" width="58" height="6" rx="2" fill="#1A1A1A"/>
  <rect x="250" y="426" width="90" height="5" rx="2" fill="#252525"/>

  <!-- Agents on screen -->
  <g transform="translate(242, 344)">
    <rect x="-17" y="-14" width="34" height="32" rx="6" fill="#C8860A"/>
    <rect x="-11" y="-8" width="8" height="8" rx="2" fill="#0D1E2C"/>
    <rect x="3" y="-8" width="8" height="8" rx="2" fill="#0D1E2C"/>
    <rect x="-8" y="7" width="16" height="3" rx="1" fill="#0D1E2C"/>
    <rect x="-2" y="-20" width="4" height="8" rx="2" fill="#C8860A"/>
    <circle cx="0" cy="-23" r="4" fill="#E8A832"/>
  </g>

  <g transform="translate(322, 344)">
    <rect x="-17" y="-14" width="34" height="32" rx="6" fill="#C8860A"/>
    <rect x="-11" y="-8" width="8" height="8" rx="2" fill="#0D1E2C"/>
    <rect x="3" y="-8" width="8" height="8" rx="2" fill="#0D1E2C"/>
    <path d="M-8 8 Q0 14 8 8" stroke="#0D1E2C" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <rect x="-2" y="-20" width="4" height="8" rx="2" fill="#C8860A"/>
    <circle cx="0" cy="-23" r="4" fill="#E8A832"/>
  </g>

  <!-- Agent activity lines -->
  <rect x="216" y="370" width="70" height="3" rx="1" fill="#C8860A" opacity="0.35"/>
  <rect x="216" y="377" width="48" height="3" rx="1" fill="#C8860A" opacity="0.22"/>
  <rect x="300" y="370" width="60" height="3" rx="1" fill="#C8860A" opacity="0.35"/>
  <rect x="300" y="377" width="38" height="3" rx="1" fill="#C8860A" opacity="0.22"/>

  <!-- Printer -->
  <rect x="420" y="352" width="94" height="70" rx="8" fill="#2D2D2D"/>
  <rect x="433" y="342" width="68" height="14" rx="4" fill="#3A3A3A"/>
  <circle cx="492" cy="374" r="5" fill="#C8860A"/>
  <rect x="433" y="365" width="42" height="2.5" rx="1" fill="#404040"/>
  <rect x="433" y="373" width="30" height="2.5" rx="1" fill="#404040"/>
  <rect x="433" y="419" width="68" height="5" rx="2" fill="#1A1A1A"/>

  <!-- Bills -->
  <rect x="437" y="415" width="60" height="34" rx="3" fill="#D8EDD8"/>
  <rect x="441" y="419" width="52" height="26" rx="2" fill="none" stroke="#48A860" stroke-width="1.2" stroke-dasharray="3,2"/>
  <text x="459" y="436" font-family="Georgia, serif" font-size="16" font-weight="700" fill="#2E7A3C">$</text>

  <g transform="translate(462, 374) rotate(-11)">
    <rect x="-29" y="-17" width="58" height="34" rx="3" fill="#D8EDD8" opacity="0.88"/>
    <text x="-8" y="5" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#2E7A3C" opacity="0.88">$</text>
  </g>

  <g transform="translate(476, 316) rotate(7)">
    <rect x="-24" y="-14" width="48" height="28" rx="3" fill="#D8EDD8" opacity="0.6"/>
    <text x="-6" y="4" font-family="Georgia, serif" font-size="12" font-weight="700" fill="#2E7A3C" opacity="0.6">$</text>
  </g>

  <!-- Dashed line agents → printer -->
  <path d="M382 350 Q400 350 420 370" stroke="#C8860A" stroke-width="1.5" fill="none" stroke-dasharray="5,4" opacity="0.28"/>

  <!-- Gear (decorative) -->
  <g transform="translate(80, 148)" opacity="0.28">
    <circle r="32" fill="none" stroke="#C8860A" stroke-width="10"/>
    <circle r="12" fill="#C8860A"/>
    <rect x="-7" y="-46" width="14" height="16" rx="3" fill="#C8860A"/>
    <rect x="-7" y="30" width="14" height="16" rx="3" fill="#C8860A"/>
    <rect x="-46" y="-7" width="16" height="14" rx="3" fill="#C8860A"/>
    <rect x="30" y="-7" width="16" height="14" rx="3" fill="#C8860A"/>
    <g transform="rotate(45)">
      <rect x="-7" y="-46" width="14" height="16" rx="3" fill="#C8860A"/>
      <rect x="-7" y="30" width="14" height="16" rx="3" fill="#C8860A"/>
      <rect x="-46" y="-7" width="16" height="14" rx="3" fill="#C8860A"/>
      <rect x="30" y="-7" width="16" height="14" rx="3" fill="#C8860A"/>
    </g>
  </g>

  <!-- ===== DIVIDER ===== -->
  <rect x="560" y="60" width="1" height="510" fill="#E0DCD4"/>

  <!-- ===== RIGHT SIDE: TEXT ===== -->

  <!-- Publication name -->
  <text
    x="622"
    y="230"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="62"
    font-weight="700"
    fill="#1A1A1A"
    letter-spacing="-1"
  >Sleeping</text>
  <text
    x="622"
    y="304"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="62"
    font-weight="700"
    fill="#1A1A1A"
    letter-spacing="-1"
  >Employees</text>

  <!-- Amber underline -->
  <rect x="622" y="322" width="220" height="4" rx="2" fill="#C8860A"/>

  <!-- Tagline -->
  <text
    x="622"
    y="376"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="22"
    fill="#4A4A4A"
    letter-spacing="0.3"
  >AI agents. Real outcomes.</text>

  <!-- Byline -->
  <text
    x="622"
    y="440"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="17"
    fill="#9A9A8E"
    letter-spacing="0.2"
  >by Manu Ramchandani</text>

  <!-- Domain -->
  <text
    x="622"
    y="530"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="16"
    fill="#C8860A"
    letter-spacing="0.5"
  >sleepingemployees.com</text>

</svg>
